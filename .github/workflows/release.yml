name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Build binaries
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist

          # Linux
          GOOS=linux GOARCH=amd64 go build -o dist/oc-monitor-linux-amd64 ./cmd/oc-monitor
          GOOS=linux GOARCH=arm64 go build -o dist/oc-monitor-linux-arm64 ./cmd/oc-monitor

          # macOS
          GOOS=darwin GOARCH=amd64 go build -o dist/oc-monitor-darwin-amd64 ./cmd/oc-monitor
          GOOS=darwin GOARCH=arm64 go build -o dist/oc-monitor-darwin-arm64 ./cmd/oc-monitor

          # Windows
          GOOS=windows GOARCH=amd64 go build -o dist/oc-monitor-windows-amd64.exe ./cmd/oc-monitor

          # Create checksums
          cd dist
          sha256sum * | tee sha256sums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
